<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dados dos Clientes</title>

  <link rel="stylesheet" href="../CSS/clientes.css">
  <link rel="stylesheet" href="../CSS/dashboard.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="opcoes">
    <h2>OPÇÕES</h2>

    <a class="nao-ativo" href="dashboard.html">
      <i class="fa-solid fa-chart-column"></i> Dashboard
    </a>

    <a class="menu-ativo" href="clientes.html">
      <i class="fa-solid fa-users"></i> Dados dos Clientes
    </a>

    <a class="nao-ativo" href="pagamentos.html">
      <i class="fa-solid fa-credit-card"></i> Pagamentos
    </a>

    <a class="nao-ativo" href="importacao.html">
      <i class="fa-solid fa-folder-open"></i> Importar/Exportar
    </a>
  </div>

  <div class="conteudo">
    <h2 class="titulo">DADOS DOS CLIENTES</h2>

    <div class="barra-acoes">
      <button class="btn" id="btn-novo">
        <i class="fa-solid fa-user-plus"></i> Novo Cliente
      </button>

      <div class="campo-pesquisa">
        <input
          type="text"
          class="pesquisa"
          id="pesquisa"
          placeholder="Pesquisar Cliente - nome/CPF"
        >
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>

      <button class="btn" id="btn-editar">
        <i class="fa-solid fa-pen"></i> Editar
      </button>

      <button class="btn" id="btn-excluir">
        <i class="fa-solid fa-trash"></i> Excluir
      </button>
    </div>

    <table class="tabela-clientes">
      <thead>
        <tr>
          <th>Selecionar</th>
          <th>Nome</th>
          <th>CPF</th>
          <th>Telefone/Whatsapp</th>
          <th>Endereço</th>
          <th>E-mail</th>
        </tr>
      </thead>

      <tbody id="tabela-body">
        <!-- preenchido pelo JavaScript -->
      </tbody>
    </table>
  </div>

  <div id="modal-cliente" class="modal hidden">
    <div class="modal-conteudo">
      <h2 id="modal-titulo">Novo Cliente</h2>

      <label for="input-nome">Nome:</label>
      <input type="text" id="input-nome">

      <label for="input-cpf">CPF:</label>
      <input type="text" id="input-cpf">

      <label for="input-telefone">Telefone/Whatsapp:</label>
      <input type="text" id="input-telefone">

      <label for="input-endereco">Endereço:</label>
      <input type="text" id="input-endereco">

      <label for="input-email">E-mail:</label>
      <input type="email" id="input-email">

      <div class="botoes-modal">
        <button id="btn-confirmar">Confirmar</button>
        <button id="btn-cancelar">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="banco.js"></script>
  <script src="clientes.js"></script>
</body>
</html>
