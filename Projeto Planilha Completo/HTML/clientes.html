<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dados dos Clientes</title>

  <link rel="stylesheet" href="../CSS/dashboard.css">
  <link rel="stylesheet" href="../CSS/clientes.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <div class="opcoes">
    <h2>OPÇÕES</h2>

    <a class="nao-ativo" href="dashboard.html">
      <i class="fa-solid fa-chart-column"></i> Dashboard
    </a>

    <a class="menu-ativo" href="clientes.html">
      <i class="fa-solid fa-users"></i> Dados dos Clientes
    </a>

    <a class="nao-ativo" href="pagamentos.html">
      <i class="fa-solid fa-credit-card"></i> Pagamentos
    </a>

    <a class="nao-ativo" href="importacao.html">
      <i class="fa-solid fa-folder-open"></i> Exportar
    </a>

    <a class="nao-ativo" href="sobre.html">
      <i class="fa-solid fa-circle-info"></i> Sobre
    </a>
  </div>

  <div class="conteudo">
    <h2 class="titulo">DADOS DOS CLIENTES</h2>

    <div class="barra-acoes">
      <button id="btn-novo" class="btn" type="button">
        <i class="fa-solid fa-user-plus"></i> Novo Cliente
      </button>

      <div class="campo-pesquisa">
        <input id="pesquisa" type="text" class="pesquisa" placeholder="Pesquisar Cliente - nome/CPF">
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>

      <button id="btn-editar" class="btn" type="button">
        <i class="fa-solid fa-pen"></i> Editar
      </button>

      <button id="btn-excluir" class="btn" type="button">
        <i class="fa-solid fa-trash"></i> Excluir
      </button>
    </div>

    <table class="tabela-clientes">
      <thead>
        <tr>
          <th class="coluna-selecao">Selecionar</th>
          <th>Nome</th>
          <th>CPF</th>
          <th>Telefone/Whatsapp</th>
          <th>Endereço</th>
          <th>E-mail</th>
        </tr>
      </thead>

      <tbody id="tabela-body">
        <tr>
          <td colspan="6" class="mensagem-vazia">Nenhum cliente cadastrado.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div id="modal-cliente" class="modal hidden">
    <div class="modal-caixa">
      <h3 id="modal-titulo">Novo Cliente</h3>

      <div class="form-grid">
        <div class="campo-form full">
          <label for="input-nome">Nome</label>
          <input id="input-nome" type="text">
        </div>

        <div class="campo-form">
          <label for="input-cpf">CPF</label>
          <input id="input-cpf" type="text" maxlength="14">
        </div>

        <div class="campo-form">
          <label for="input-telefone">Telefone/Whatsapp</label>
          <input id="input-telefone" type="text" maxlength="15">
        </div>

        <div class="campo-form full">
          <label for="input-endereco">Endereço</label>
          <input id="input-endereco" type="text">
        </div>

        <div class="campo-form full">
          <label for="input-email">E-mail</label>
          <input id="input-email" type="email">
        </div>

        <div class="campo-form">
          <label for="input-valor">Valor</label>
          <input id="input-valor" type="text" placeholder="Ex: 100,00">
        </div>

        <div class="campo-form">
          <label for="input-vencimento">Vencimento</label>
          <input id="input-vencimento" type="date">
        </div>

        <div class="campo-form">
          <label for="input-status-pagamento">Status</label>
          <select id="input-status-pagamento">
            <option value="Pendente">Pendente</option>
            <option value="Pago">Pago</option>
            <option value="Atrasado">Atrasado</option>
          </select>
        </div>

        <div class="campo-form">
          <label for="input-ativo">Situação</label>
          <select id="input-ativo">
            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
          </select>
        </div>

        <div class="campo-form full">
          <label for="input-ultimo-pagamento">Último Pagamento</label>
          <input id="input-ultimo-pagamento" type="date">
        </div>
      </div>

      <div class="modal-acoes">
        <button id="btn-confirmar" class="btn" type="button">
          <i class="fa-solid fa-check"></i> Salvar
        </button>

        <button id="btn-cancelar" class="btn" type="button">
          <i class="fa-solid fa-xmark"></i> Cancelar
        </button>
      </div>
    </div>
  </div>

  <script src="ui-feedback.js"></script>
  <script src="banco.js"></script>
  <script src="clientes.js"></script>
</body>
</html>
