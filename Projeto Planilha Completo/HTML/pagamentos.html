<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamentos</title>

  <link rel="stylesheet" href="../CSS/dashboard.css">
  <link rel="stylesheet" href="../CSS/clientes.css">
  <link rel="stylesheet" href="../CSS/pagamentos.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="opcoes">
    <h2>OPÇÕES</h2>

    <a class="nao-ativo" href="dashboard.html">
      <i class="fa-solid fa-chart-column"></i>
      Dashboard
    </a>

    <a class="nao-ativo" href="clientes.html">
      <i class="fa-solid fa-users"></i>
      Dados dos Clientes
    </a>

    <a class="menu-ativo" href="pagamentos.html">
      <i class="fa-solid fa-credit-card"></i>
      Pagamentos
    </a>

    <a class="nao-ativo" href="importacao.html">
      <i class="fa-solid fa-file-export"></i>
      Exportação
    </a>

    <a class="nao-ativo" href="sobre.html">
      <i class="fa-solid fa-circle-info"></i>
      Sobre
    </a>
  </div>

  <div class="conteudo">
    <h2 class="titulo">PAGAMENTOS</h2>

    <div class="barra-acoes">
      <div class="campo-pesquisa">
        <input
          type="text"
          class="pesquisa"
          id="pesquisa"
          placeholder="Pesquisar cliente - nome/CPF"
          autocomplete="off"
        >
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>

      <button class="btn" id="btn-editar" type="button">
        <i class="fa-solid fa-pen"></i> Editar
      </button>
    </div>

    <table class="tabela-clientes">
      <thead>
        <tr>
          <th>Selecionar</th>
          <th>Nome</th>
          <th>CPF</th>
          <th>Valor</th>
          <th>Vencimento</th>
          <th>Status</th>
          <th>Ativo/Não Ativo</th>
          <th>Último Pagamento</th>
          <th>Dias / Situação</th>
        </tr>
      </thead>

      <tbody id="tabela-body"></tbody>
    </table>
  </div>

  <div id="modal-pagamento" class="modal hidden">
    <div class="modal-conteudo">
      <h2>Editar Pagamento</h2>

      <label for="input-nome">Nome:</label>
      <input type="text" id="input-nome" autocomplete="off">

      <label for="input-cpf">CPF:</label>
      <input type="text" id="input-cpf" maxlength="14" placeholder="000.000.000-00" autocomplete="off">

      <label for="input-valor">Valor:</label>
      <input type="text" id="input-valor" inputmode="decimal" placeholder="0,00" autocomplete="off">

      <label for="input-vencimento">Vencimento:</label>
      <input type="date" id="input-vencimento">

      <label for="input-status">Status:</label>
      <input type="text" id="input-status" readonly>

      <label for="input-ativo">Ativo/Não Ativo:</label>
      <select id="input-ativo">
        <option value="Ativo">Ativo</option>
        <option value="Inativo">Inativo</option>
      </select>

      <label for="input-ultimo-pagamento">Último Pagamento:</label>
      <input type="date" id="input-ultimo-pagamento">

      <label for="input-atraso">Dias / Situação:</label>
      <input type="text" id="input-atraso" readonly>

      <div class="botoes-modal">
        <button id="btn-confirmar" type="button">Confirmar</button>
        <button id="btn-cancelar" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="ui-feedback.js"></script>
  <script src="banco.js"></script>
  <script src="pagamentos.js"></script>
</body>
</html>
