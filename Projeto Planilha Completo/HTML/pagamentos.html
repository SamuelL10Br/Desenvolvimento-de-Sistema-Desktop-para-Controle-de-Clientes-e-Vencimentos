<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamentos</title>

  <link rel="stylesheet" href="../CSS/dashboard.css">
  <link rel="stylesheet" href="../CSS/clientes.css">
  <link rel="stylesheet" href="../CSS/pagamentos.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <div class="opcoes">
    <h2>OPÇÕES</h2>

    <a class="nao-ativo" href="dashboard.html">
      <i class="fa-solid fa-chart-column"></i> Dashboard
    </a>

    <a class="nao-ativo" href="clientes.html">
      <i class="fa-solid fa-users"></i> Dados dos Clientes
    </a>

    <a class="menu-ativo" href="pagamentos.html">
      <i class="fa-solid fa-credit-card"></i> Pagamentos
    </a>

    <a class="nao-ativo" href="importacao.html">
      <i class="fa-solid fa-folder-open"></i> Exportar
    </a>

    <a class="nao-ativo" href="sobre.html">
      <i class="fa-solid fa-circle-info"></i> Sobre
    </a>
  </div>

  <div class="conteudo">
    <h2 class="titulo">PAGAMENTOS</h2>

    <div class="barra-acoes">
      <div class="campo-pesquisa">
        <input id="campoFiltro" type="text" class="pesquisa" placeholder="Pesquisar Cliente - nome/CPF">
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>

      <button id="btnEditarPagamento" class="btn" type="button">
        <i class="fa-solid fa-pen"></i> Editar
      </button>
    </div>

    <table id="tabela-pagamentos" class="tabela-clientes">
      <thead>
        <tr>
          <th>Selecionar</th>
          <th>Nome</th>
          <th>CPF</th>
          <th>Valor</th>
          <th>Início</th>
          <th>Vencimento</th>
          <th>Status</th>
          <th>Dias para vencer</th>
        </tr>
      </thead>

      <tbody id="tabela-body">
        <tr>
          <td colspan="8" class="mensagem-vazia">Nenhum pagamento cadastrado.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div id="modal-pagamento" class="modal hidden">
    <div class="modal-caixa">
      <h3>Editar Pagamento</h3>

      <div class="form-grid">
        <div class="campo-form full">
          <label>Cliente</label>
          <input id="pagamento-nome" type="text" disabled>
        </div>

        <div class="campo-form">
          <label>Valor</label>
          <input id="pagamento-valor" type="text" placeholder="Ex: 100,00">
        </div>

        <div class="campo-form">
          <label>Vencimento</label>
          <input id="pagamento-vencimento" type="date">
        </div>

        <div class="campo-form">
          <label>Status</label>
          <select id="pagamento-status">
            <option value="Automatico">Automático</option>
            <option value="Pago">Pago</option>
          </select>
        </div>

        <div class="campo-form">
          <label>Último Pagamento</label>
          <input id="pagamento-ultimo" type="date">
        </div>
      </div>

      <div class="modal-acoes">
        <button id="btnSalvarPagamento" class="btn" type="button">
          <i class="fa-solid fa-check"></i> Salvar
        </button>

        <button id="btnCancelarPagamento" class="btn" type="button">
          <i class="fa-solid fa-xmark"></i> Cancelar
        </button>
      </div>
    </div>
  </div>

  <script src="ui-feedback.js"></script>
  <script src="banco.js"></script>
  <script src="pagamentos.js"></script>
</body>
</html>
