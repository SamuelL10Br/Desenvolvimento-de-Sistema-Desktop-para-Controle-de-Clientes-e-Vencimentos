<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exportação</title>

  <link rel="stylesheet" href="../CSS/importacao.css">
  <link rel="stylesheet" href="../CSS/dashboard.css">
  <link rel="stylesheet" href="../CSS/clientes.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="opcoes">
    <h2>OPÇÕES</h2>

    <a class="nao-ativo" href="dashboard.html">
      <i class="fa-solid fa-chart-column"></i>
      Dashboard
    </a>

    <a class="nao-ativo" href="clientes.html">
      <i class="fa-solid fa-users"></i>
      Dados dos Clientes
    </a>

    <a class="nao-ativo" href="pagamentos.html">
      <i class="fa-solid fa-credit-card"></i>
      Pagamentos
    </a>

    <a class="menu-ativo" href="importacao.html">
      <i class="fa-solid fa-file-export"></i>
      Exportação
    </a>

    <a class="nao-ativo" href="sobre.html">
      <i class="fa-solid fa-circle-info"></i>
      Sobre
    </a>
  </div>

  <div class="conteudo">
    <h2 class="titulo">EXPORTAÇÃO DE DADOS DOS CLIENTES</h2>

    <div class="barra-acoes barra-principal">
      <input
        type="text"
        id="campoFiltro"
        placeholder="Digite um termo opcional para pesquisar nos campos marcados"
        autocomplete="off"
      >

      <button class="btn" id="btnExportarJson" type="button">Exportar JSON</button>
      <button class="btn" id="btnExportarCsv" type="button">Exportar CSV</button>
      <button class="btn" id="btnExportarExcel" type="button">Exportar Excel</button>
    </div>

    <div class="painel-filtros">
      <div class="painel-filtros-titulo">
        <i class="fa-solid fa-filter"></i>
        Campos do filtro / colunas visíveis
      </div>

      <div class="grid-filtros">
        <label class="item-filtro"><input type="checkbox" class="filtro-campo" value="nome" checked><span>Nome</span></label>
        <label class="item-filtro"><input type="checkbox" class="filtro-campo" value="ultimoPagamento" checked><span>Último pagamento</span></label>
        <label class="item-filtro"><input type="checkbox" class="filtro-campo" value="cpf" checked><span>CPF</span></label>
        <label class="item-filtro"><input type="checkbox" class="filtro-campo" value="status" checked><span>Status</span></label>
        <label class="item-filtro"><input type="checkbox" class="filtro-campo" value="valor" checked><span>Valor</span></label>
        <label class="item-filtro"><input type="checkbox" class="filtro-campo" value="ativo" checked><span>Ativo/Inativo</span></label>
        <label class="item-filtro"><input type="checkbox" class="filtro-campo" value="vencimento" checked><span>Vencimento</span></label>
        <label class="item-filtro"><input type="checkbox" class="filtro-campo" value="email" checked><span>Email</span></label>
        <label class="item-filtro"><input type="checkbox" class="filtro-campo" value="diaVenc" checked><span>Dia/Venc</span></label>
        <label class="item-filtro"><input type="checkbox" class="filtro-campo" value="telefone" checked><span>Telefone/Whatsapp</span></label>
        <label class="item-filtro"><input type="checkbox" class="filtro-campo" value="endereco" checked><span>Endereço</span></label>
      </div>
    </div>

    <div class="tabela-wrapper">
      <table id="tabelaClientes">
        <thead>
          <tr>
            <th data-coluna="nome">Nome</th>
            <th data-coluna="cpf">CPF</th>
            <th data-coluna="email">E-mail</th>
            <th data-coluna="telefone">Telefone/Whatsapp</th>
            <th data-coluna="endereco">Endereço</th>
            <th data-coluna="valor">Valor</th>
            <th data-coluna="vencimento">Vencimento</th>
            <th data-coluna="diaVenc">Dia/Venc</th>
            <th data-coluna="status">Status</th>
            <th data-coluna="ativo">Ativo/Inativo</th>
            <th data-coluna="ultimoPagamento">Último Pagamento</th>
          </tr>
        </thead>
        <tbody id="corpoTabelaClientes"></tbody>
      </table>
    </div>
  </div>

  <script src="ui-feedback.js"></script>
  <script src="banco.js"></script>
  <script src="importacao.js"></script>
</body>
</html>
