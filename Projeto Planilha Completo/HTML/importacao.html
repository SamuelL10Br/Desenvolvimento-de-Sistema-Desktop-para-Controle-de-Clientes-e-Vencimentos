<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Importar/Exportar</title>

  <link rel="stylesheet" href="../CSS/importacao.css">
  <link rel="stylesheet" href="../CSS/dashboard.css">
  <link rel="stylesheet" href="../CSS/clientes.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  >
</head>
<body>
  <div class="opcoes">
    <h2>OPÇÕES</h2>

    <a class="nao-ativo" href="dashboard.html">
      <i class="fa-solid fa-chart-column"></i>
      Dashboard
    </a>

    <a class="nao-ativo" href="clientes.html">
      <i class="fa-solid fa-users"></i>
      Dados dos Clientes
    </a>

    <a class="nao-ativo" href="pagamentos.html">
      <i class="fa-solid fa-credit-card"></i>
      Pagamentos
    </a>

    <a class="menu-ativo" href="importacao.html">
      <i class="fa-solid fa-folder-open"></i>
      Importar/Exportar
    </a>
  </div>

  <div class="conteudo">
    <h2 class="titulo">IMPORTAR/EXPORTAR DADOS</h2>

    <div class="barra-acoes">
      <button class="btn" id="btnImportar" type="button">
        <i class="fa-solid fa-file-import"></i>
        Importar
      </button>

      <input
        type="file"
        id="inputImportar"
        accept=".json,.csv,.txt,.xls,.xlsx"
        style="display: none;"
      >

      <div class="exportar-container">
        <button class="btn" id="btnExportar" type="button">
          <i class="fa-solid fa-file-export"></i>
          Exportar
        </button>

        <div class="exportar-box" id="exportarBox">
          <button class="btn-opcao-exportar" id="btnExportarJson" type="button">
            Exportar JSON
          </button>

          <button class="btn-opcao-exportar" id="btnExportarCsv" type="button">
            Exportar CSV
          </button>

          <button class="btn-opcao-exportar" id="btnExportarExcel" type="button">
            Exportar Excel
          </button>
        </div>
      </div>

      <div class="campo-pesquisa">
        <input
          type="text"
          class="pesquisa"
          id="pesquisaCliente"
          placeholder="Pesquisar Cliente"
        >
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>

      <div class="filtro-container">
        <button class="btn" id="btnAbrirFiltro" type="button">
          <i class="fa-solid fa-filter"></i>
          Filtrar
        </button>

        <div class="filtro-box" id="filtroBox">
          <label>
            <input type="checkbox" value="nome" class="filtro-coluna">
            Nome
          </label>

          <label>
            <input type="checkbox" value="cpf" class="filtro-coluna">
            CPF
          </label>

          <label>
            <input type="checkbox" value="valor" class="filtro-coluna">
            Valor
          </label>

          <label>
            <input type="checkbox" value="vencimento" class="filtro-coluna">
            Vencimento
          </label>

          <label>
            <input type="checkbox" value="statusPagamento" class="filtro-coluna">
            Status
          </label>

          <label>
            <input type="checkbox" value="ativo" class="filtro-coluna">
            Ativo/Não Ativo
          </label>

          <label>
            <input type="checkbox" value="ultimoPagamento" class="filtro-coluna">
            Último Pagamento
          </label>

          <label>
            <input type="checkbox" value="telefone" class="filtro-coluna">
            Telefone/Whatsapp
          </label>

          <label>
            <input type="checkbox" value="endereco" class="filtro-coluna">
            Endereço
          </label>

          <label>
            <input type="checkbox" value="email" class="filtro-coluna">
            E-mail
          </label>

          <button class="btn" id="btnAplicarFiltro" type="button">
            <i class="fa-solid fa-check"></i>
            Aplicar
          </button>
        </div>
      </div>
    </div>

    <table class="tabela-clientes" id="tabelaFinanceira">
      <thead>
        <tr>
          <th>Nome</th>
          <th>CPF</th>
          <th>Valor</th>
          <th>Vencimento</th>
          <th>Status</th>
          <th>Ativo/Não Ativo</th>
          <th>Último Pagamento</th>
          <th>Dias em Atraso</th>
        </tr>
      </thead>

      <tbody id="corpoTabelaImportacao"></tbody>
    </table>

    <table class="tabela-clientes" id="tabelaDadosPessoais">
      <thead>
        <tr>
          <th>Nome</th>
          <th>CPF</th>
          <th>Telefone/Whatsapp</th>
          <th>Endereço</th>
          <th>E-mail</th>
        </tr>
      </thead>

      <tbody id="corpoTabelaDadosPessoais"></tbody>
    </table>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="banco.js"></script>
  <script src="importacao.js"></script>
</body>
</html>
